name: Profile Signals

concurrency:
  group: profile-signals
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - media/**
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch

      - name: Generate profile signals for output branch
        env:
          PROFILE_SIGNAL_TOKEN: ${{ secrets.PROFILE_SIGNAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          PROFILE_SIGNAL_OUTPUT_DIR: ${{ github.workspace }}/output-branch
          PROFILE_SIGNAL_SKIP_README_UPDATE: "true"
          PROFILE_LANGUAGE_SCOPE: ${{ vars.PROFILE_LANGUAGE_SCOPE || secrets.PROFILE_LANGUAGE_SCOPE || 'all' }}
        run: node .github/scripts/profile-signals.mjs

      - name: Commit signal updates to output branch
        run: |
          cd output-branch

          git add -A media

          if git diff --cached --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "signals"
          git push origin output
