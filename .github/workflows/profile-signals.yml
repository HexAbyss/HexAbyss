name: Profile Signals

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - media/**
  schedule:
    - cron: "15 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - profile-refresh

permissions:
  contents: write

jobs:
  update-signals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate profile signals
        env:
          PROFILE_SIGNAL_TOKEN: ${{ secrets.PROFILE_SIGNAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node .github/scripts/profile-signals.mjs

      - name: Commit signal updates
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md media/constellation-graph.svg media/neural-pulse.svg media/architecture-radar.svg media/top-languages.svg
          git commit -m "signals"
          git push
